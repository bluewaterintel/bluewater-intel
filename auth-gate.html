<!-- Auth gate — shown until Supabase session exists -->
<div id="bw-auth-gate" style="
  position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#0a1628 0%,#0d2847 50%,#0a1628 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;font-family:'Segoe UI',system-ui,sans-serif">
  <div style="width:100%;max-width:380px;background:rgba(15,35,60,.92);border:1px solid rgba(107,191,234,.25);
              border-radius:16px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.45)">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:22px;font-weight:800;color:#f0f6ff;letter-spacing:.02em">BlueWater Intel</div>
      <div style="font-size:12px;color:#9ec5e8;margin-top:6px">Sign in to sync your waypoints &amp; catches</div>
    </div>
    <div id="bw-auth-msg" style="display:none;font-size:12px;color:#fca5a5;margin-bottom:12px;text-align:center"></div>
    <label style="display:block;font-size:11px;color:#9ec5e8;margin-bottom:4px">Email</label>
    <input id="bw-auth-email" type="email" autocomplete="email" placeholder="you@example.com" style="
      width:100%;box-sizing:border-box;margin-bottom:12px;padding:11px 12px;border-radius:8px;border:1px solid rgba(107,191,234,.3);
      background:#0a1628;color:#f0f6ff;font-size:14px;font-family:inherit"/>
    <label style="display:block;font-size:11px;color:#9ec5e8;margin-bottom:4px">Password</label>
    <input id="bw-auth-password" type="password" autocomplete="current-password" placeholder="••••••••" style="
      width:100%;box-sizing:border-box;margin-bottom:18px;padding:11px 12px;border-radius:8px;border:1px solid rgba(107,191,234,.3);
      background:#0a1628;color:#f0f6ff;font-size:14px;font-family:inherit"/>
    <button id="bw-auth-signin" type="button" style="
      width:100%;padding:12px;border:none;border-radius:9px;background:#2979b5;color:#fff;font-weight:700;font-size:14px;
      cursor:pointer;font-family:inherit;margin-bottom:10px">Sign In</button>
    <button id="bw-auth-signup" type="button" style="
      width:100%;padding:11px;border:1px solid rgba(107,191,234,.35);border-radius:9px;background:transparent;color:#6bbfea;
      font-weight:600;font-size:13px;cursor:pointer;font-family:inherit">Create Account</button>
  </div>
</div>
<script>
(function(){
  const gate = document.getElementById("bw-auth-gate");
  const msg = document.getElementById("bw-auth-msg");
  const emailEl = document.getElementById("bw-auth-email");
  const passEl = document.getElementById("bw-auth-password");

  function showErr(t){ msg.textContent=t; msg.style.display="block"; }
  function hideGate(){ if(gate) gate.style.display="none"; }
  function showGate(){ if(gate) gate.style.display="flex"; }

  async function onSignedIn(user){
    if(typeof USER_PREFS !== "undefined"){
      USER_PREFS.account = {
        name: (user.user_metadata && user.user_metadata.full_name) || (user.email ? user.email.split("@")[0] : "Captain"),
        email: user.email || "",
      };
    }
    if(typeof renderAccountSection === "function") renderAccountSection();
    if(typeof window.bwOnSignedIn === "function"){
      try { await window.bwOnSignedIn(user); } catch(e){ console.error(e); }
    }
    hideGate();
  }

  function wireAuth(){
    if(!window.BW_AUTH){ setTimeout(wireAuth, 100); return; }
    window.BW_AUTH.onAuthChange(async (user) => {
      if(user) await onSignedIn(user);
      else showGate();
    });
    if(window.BW_AUTH.getUser()) hideGate();
  }
  wireAuth();

  document.getElementById("bw-auth-signin").addEventListener("click", async () => {
    msg.style.display="none";
    try {
      await window.BW_AUTH.signIn(emailEl.value.trim(), passEl.value);
    } catch(e){ showErr(e.message || "Sign in failed"); }
  });
  document.getElementById("bw-auth-signup").addEventListener("click", async () => {
    msg.style.display="none";
    try {
      const res = await window.BW_AUTH.signUp(emailEl.value.trim(), passEl.value);
      if(res.session) return;
      showErr("Check your email to confirm your account, then sign in.");
    } catch(e){ showErr(e.message || "Sign up failed"); }
  });
})();
</script>
