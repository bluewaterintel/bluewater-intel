[build]
  command = "node scripts/generate-bw-config.mjs"
  publish = "."

[build.environment]
  NODE_VERSION = "22"

# Ensure Git-connected builds pick up netlify.toml from repo root.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/bw-data-source.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/bw-config.js"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
